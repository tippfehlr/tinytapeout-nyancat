# Tiny Tapeout project information
project:
  title:        "Nyan Cat + Morse Code"
  author:       "tippfehlr"
  discord:      "tippfehlr"
  description:  "Plays Nyan Cat lead melody as PWM square wave on uo[0] (piezo speaker). Outputs Morse code 'HELLO WORLD' on uo[7:1] and uio[7:0]. Clock: 25 MHz. Written with GitHub Copilot"
  language:     "Verilog"
  clock_hz:     25000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_example"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Piezo speaker PWM (Nyan Cat lead melody)"
  uo[1]: "Morse code output"
  uo[2]: "Morse code output"
  uo[3]: "Morse code output"
  uo[4]: "Morse code output"
  uo[5]: "Morse code output"
  uo[6]: "Morse code output"
  uo[7]: "Morse code output"

  # Bidirectional pins
  uio[0]: "Morse code output"
  uio[1]: "Morse code output"
  uio[2]: "Morse code output"
  uio[3]: "Morse code output"
  uio[4]: "Morse code output"
  uio[5]: "Morse code output"
  uio[6]: "Morse code output"
  uio[7]: "Morse code output"

# Do not change!
yaml_version: 6
