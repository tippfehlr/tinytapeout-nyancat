# Tiny Tapeout project information
project:
  title:        "Morse Code HELLO WORLD"      # Project title
  author:       ""      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Outputs Morse code for 'HELLO WORLD' on all output pins at ~20 WPM (~16 Hz clock)"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     16       # Clock frequency in Hz: ~16 Hz gives ~20 WPM (1 clock cycle = 1 Morse unit ≈ 62.5 ms)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_example"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Morse code output bit 0"
  uo[1]: "Morse code output bit 1"
  uo[2]: "Morse code output bit 2"
  uo[3]: "Morse code output bit 3"
  uo[4]: "Morse code output bit 4"
  uo[5]: "Morse code output bit 5"
  uo[6]: "Morse code output bit 6"
  uo[7]: "Morse code output bit 7"

  # Bidirectional pins
  uio[0]: "Morse code output bit 0"
  uio[1]: "Morse code output bit 1"
  uio[2]: "Morse code output bit 2"
  uio[3]: "Morse code output bit 3"
  uio[4]: "Morse code output bit 4"
  uio[5]: "Morse code output bit 5"
  uio[6]: "Morse code output bit 6"
  uio[7]: "Morse code output bit 7"

# Do not change!
yaml_version: 6
